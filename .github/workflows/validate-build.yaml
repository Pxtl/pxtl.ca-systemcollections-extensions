name: Validate

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: |
            10.x
            8.0.x

      - name: Restore dependencies
        run: dotnet restore PxtlCa.SystemCollectionsExtensions.slnx

      - name: Build solution
        run: dotnet build PxtlCa.SystemCollectionsExtensions.slnx --no-restore --configuration Release

      - name: Run tests
        run: dotnet test PxtlCa.SystemCollectionsExtensions.slnx --no-build --configuration Release --verbosity normal