name: Publish NuGet

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version number (optional)'
        required: false
        default: ''
      notes:
        description: 'Release notes (optional)'
        required: false
        default: ''

  workflow_run:
    workflows: ["validate-build"]
    branches: [main]
    types: [completed]

jobs:
  publish:
    runs-on: ubuntu-latest
    if: github.event.workflow_run.conclusion == 'success' && github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            10.x
            8.0.x

      - name: Restore dependencies
        run: dotnet restore CollectionsSpecializedExtensions.slnx

      - name: Build NuGet package
        run: dotnet pack CollectionsSpecializedExtensions.slnx --configuration Release --output ./nuget
        env:
          NUGET_KEY: ${{ secrets.NUGET_API_KEY }}

      - name: Publish package to NuGet.org
        uses: NuGet/nuget-publish-github-packages@v1
        with:
          packages-directory: './nuget'
          nucleus-url: https://www.myget.org/F/nuget-temp/v3/index.json
          nucleus-authentication: true
        continue-on-error: true

      - name: Publish to NuGet.org (official)
        env:
          NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}
        run: |
          if [ $? -eq 0 ]; then
            dotnet nuget push nuget/*.nupkg --api-key "${{ secrets.NUGET_API_KEY }}" --source https://api.nuget.org/v3/index.json --skip-duplicate
          fi